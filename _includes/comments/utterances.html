<!-- https://utteranc.es/ -->
<script>
  (function () {
    const origin = 'https://utteranc.es';
    const hasThemeApi =
      typeof Theme !== 'undefined' &&
      Theme &&
      typeof Theme.getThemeMapper === 'function';

    const themeMapper = hasThemeApi
      ? Theme.getThemeMapper('github-light', 'github-dark')
      : { light: 'github-light', dark: 'github-dark' };

    function detectVisualState() {
      if (hasThemeApi && Theme.visualState) {
        return Theme.visualState;
      }

      const htmlMode = document.documentElement.getAttribute('data-mode');
      if (htmlMode === 'dark') return 'dark';
      if (htmlMode === 'light') return 'light';

      return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
        ? 'dark'
        : 'light';
    }

    const initTheme = themeMapper[detectVisualState()] || 'github-light';

    function normalizePath(path) {
      if (!path) return '/';
      return path.length > 1 ? path.replace(/\/+$/, '') : path;
    }

    function normalizeIssueTerm(text) {
      if (!text) return '';
      let value = String(text).trim();

      try {
        value = decodeURIComponent(value);
      } catch (error) {
        // Keep original value if decoding fails.
      }

      value = value.replace(/^https?:\/\/[^/]+/i, '');
      value = value.replace(/^\/+/, '');
      value = value.replace(/\/+$/, '');

      return value.toLowerCase();
    }

    function ensureStatNodes() {
      const metaRight = document.querySelector('.post-meta .d-flex.justify-content-between > div');
      if (!metaRight) {
        return null;
      }

      let viewsNode = document.getElementById('online-pageviews');
      let visitorsNode = document.getElementById('online-site-uv');
      let commentersNode = document.getElementById('utterances-commenters-count');
      let commentsNode = document.getElementById('utterances-comments-count');

      if (!viewsNode) {
        const viewsWrap = document.createElement('span');
        viewsWrap.className = 'me-2';
        viewsWrap.innerHTML = '<i class="fa-regular fa-eye"></i> <em id="online-pageviews">-</em> 浏览';
        metaRight.appendChild(viewsWrap);
        viewsNode = viewsWrap.querySelector('#online-pageviews');
      }

      if (!visitorsNode) {
        const visitorsWrap = document.createElement('span');
        visitorsWrap.className = 'me-2';
        visitorsWrap.innerHTML = '<i class="fa-solid fa-users"></i> <em id="online-site-uv">-</em> 访客';
        metaRight.appendChild(visitorsWrap);
        visitorsNode = visitorsWrap.querySelector('#online-site-uv');
      }

      if (!commentersNode) {
        const commentersWrap = document.createElement('span');
        commentersWrap.className = 'me-2';
        commentersWrap.innerHTML = '<i class="fa-regular fa-user"></i> <em id="utterances-commenters-count">-</em> 人评论过';
        metaRight.appendChild(commentersWrap);
        commentersNode = commentersWrap.querySelector('#utterances-commenters-count');
      }

      if (!commentsNode) {
        const commentsWrap = document.createElement('span');
        commentsWrap.className = 'me-2';
        commentsWrap.innerHTML = '<i class="fa-regular fa-comments"></i> <em id="utterances-comments-count">-</em> 评论';
        metaRight.appendChild(commentsWrap);
        commentsNode = commentsWrap.querySelector('#utterances-comments-count');
      }

      return { viewsNode, visitorsNode, commentersNode, commentsNode };
    }

    function ensureBusuanziBridge() {
      if (!document.getElementById('busuanzi-value-page-pv')) {
        const bridge = document.createElement('div');
        bridge.id = 'busuanzi-bridge';
        bridge.style.display = 'none';
        bridge.innerHTML =
          '<span id="busuanzi_container_page_pv"><span id="busuanzi_value_page_pv"></span></span>' +
          '<span id="busuanzi_container_site_uv"><span id="busuanzi_value_site_uv"></span></span>';
        document.body.appendChild(bridge);
      }

      if (!document.querySelector('script[data-busuanzi]')) {
        const busuanziScript = document.createElement('script');
        busuanziScript.src = '//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js';
        busuanziScript.async = true;
        busuanziScript.setAttribute('data-busuanzi', 'true');
        document.head.appendChild(busuanziScript);
      }
    }

    function updateOnlineViewStats(viewsNode, visitorsNode) {
      if (!viewsNode || !visitorsNode) return;

      ensureBusuanziBridge();

      let tries = 0;
      const maxTries = 30;
      const timer = setInterval(() => {
        tries += 1;

        const pagePv = document.getElementById('busuanzi_value_page_pv');
        const siteUv = document.getElementById('busuanzi_value_site_uv');

        const pageVal = pagePv ? pagePv.textContent.trim() : '';
        const uvVal = siteUv ? siteUv.textContent.trim() : '';

        if (pageVal) {
          viewsNode.textContent = pageVal;
        }

        if (uvVal) {
          visitorsNode.textContent = uvVal;
        }

        if ((pageVal && uvVal) || tries >= maxTries) {
          if (!pageVal) viewsNode.textContent = '-';
          if (!uvVal) visitorsNode.textContent = '-';
          clearInterval(timer);
        }
      }, 300);
    }

    async function updateCommentStats(commentersNode, commentsNode) {
      if (!commentersNode || !commentsNode) return;

      const repo = '{{ site.comments.utterances.repo }}';
      const parts = repo.split('/');
      if (parts.length !== 2) {
        commentersNode.textContent = '-';
        commentsNode.textContent = '-';
        return;
      }

      const owner = parts[0];
      const repoName = parts[1];
      const postPath = normalizePath(window.location.pathname);
      const postPathNoLead = postPath.replace(/^\/+/, '');
      const postPathNoLeadNoTrail = postPathNoLead.replace(/\/+$/, '');

      const pathCandidates = new Set([
        normalizeIssueTerm(postPath),
        normalizeIssueTerm(postPathNoLead),
        normalizeIssueTerm(postPathNoLeadNoTrail),
        normalizeIssueTerm(window.location.href),
        normalizeIssueTerm(window.location.origin + postPath)
      ]);

      commentersNode.textContent = '...';
      commentsNode.textContent = '...';

      try {
        const url = 'https://api.github.com/repos/' + owner + '/' + repoName + '/issues?state=all&per_page=100';
        const response = await fetch(url, {
          headers: {
            Accept: 'application/vnd.github+json'
          }
        });

        if (!response.ok) {
          commentersNode.textContent = '-';
          commentsNode.textContent = '-';
          return;
        }

        const issues = await response.json();
        const target = issues.find((issue) => {
          const issueTerm = normalizeIssueTerm(issue.title || '');
          return pathCandidates.has(issueTerm);
        });

        if (!target) {
          commentersNode.textContent = '0';
          commentsNode.textContent = '0';
          return;
        }

        commentsNode.textContent = String(target.comments || 0);

        if (!target.comments || !target.comments_url) {
          commentersNode.textContent = '0';
          return;
        }

        const commentsResp = await fetch(target.comments_url + '?per_page=100', {
          headers: {
            Accept: 'application/vnd.github+json'
          }
        });

        if (!commentsResp.ok) {
          commentersNode.textContent = '-';
          return;
        }

        const comments = await commentsResp.json();
        const users = new Set();
        comments.forEach((c) => {
          const login = c && c.user && c.user.login ? c.user.login : '';
          if (login) users.add(login);
        });

        commentersNode.textContent = String(users.size);
      } catch (error) {
        commentersNode.textContent = '-';
        commentsNode.textContent = '-';
      }
    }

    const statNodes = ensureStatNodes();
    if (statNodes) {
      updateOnlineViewStats(statNodes.viewsNode, statNodes.visitorsNode);
      updateCommentStats(statNodes.commentersNode, statNodes.commentsNode);
    }

    let script = document.createElement('script');
    script.src = 'https://utteranc.es/client.js';
    script.setAttribute('repo', '{{ site.comments.utterances.repo }}');
    script.setAttribute('issue-term', '{{ site.comments.utterances.issue_term }}');
    script.setAttribute('theme', initTheme);
    script.crossOrigin = 'anonymous';
    script.async = true;

    const footer = document.querySelector('footer');
    if (footer) {
      footer.insertAdjacentElement('beforebegin', script);
    } else {
      // Fallback mount point for layouts where footer is not in DOM yet.
      (document.body || document.documentElement).appendChild(script);
    }

    addEventListener('message', (event) => {
      let newTheme;

      if (hasThemeApi && event.source === window && event.data && event.data.id === Theme.ID) {
        newTheme = themeMapper[detectVisualState()] || 'github-light';

        const message = {
          type: 'set-theme',
          theme: newTheme
        };

        const utterancesFrame = document.querySelector('.utterances-frame');
        if (utterancesFrame && utterancesFrame.contentWindow) {
          utterancesFrame.contentWindow.postMessage(message, origin);
        }
      }
    });
  })();
</script>
